query RunInput {
  cart {
    buyerIdentity {
      customer {
        id
        metafield(namespace: "custom", key: "b2b") {
          value
        }
        b2bDiscount: metafield(namespace: "custom", key: "b2b_discount") {
          value
        }
      }
    }
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            vendor
            productType
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
    }
  }
  discountNode {
    metafield(namespace: "b2b-discount", key: "config") {
      value
    }
  }
}
